name: brightwing-mcp

services:
  web:
    build:
      context: .
      target: runtime
    container_name: brightwingmcp_web
    command: ["python", "http_server.py"]
    environment:
      FASTMCP_HOST: "0.0.0.0"
      FASTMCP_PORT: "8000"
      BRIGHTWING_API_URL: "https://brightwing.app"
    networks:
      - bws_network
    restart: unless-stopped

networks:
  bws_network:
    external: true
