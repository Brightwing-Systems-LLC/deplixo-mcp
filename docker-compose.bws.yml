name: deplixo-mcp

services:
  web:
    build:
      context: .
      target: runtime
    container_name: deplixomcp_web
    command: ["python", "http_server.py"]
    environment:
      FASTMCP_HOST: "0.0.0.0"
      FASTMCP_PORT: "8000"
      DEPLIXO_API_URL: "https://deplixo.com"
    networks:
      - bws_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

networks:
  bws_network:
    external: true
