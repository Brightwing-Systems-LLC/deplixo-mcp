name: deplixo-mcp

services:
  web:
    build:
      context: .
      target: runtime
    container_name: deplixomcp_web
    command: ["python", "http_server.py"]
    environment:
      FASTMCP_HOST: "0.0.0.0"
      FASTMCP_PORT: "8000"
      DEPLIXO_API_URL: "https://deplixo.com"
    networks:
      - bws_network
    restart: unless-stopped

networks:
  bws_network:
    external: true
